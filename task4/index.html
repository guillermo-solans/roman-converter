<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roman Numeral Converter</title>
    <link rel="stylesheet" href="styles.css">

    <!-- Google Analytics 4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-V80QB7NP51"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-V80QB7NP51');
    </script>
</head>
<body>
    <div class="container">
        <h1>Roman Numeral Converter</h1>

        <div class="panel">
            <h2>Integer to Roman</h2>
            <input type="number" id="intInput" placeholder="Enter a number (1–3999)">
            <button onclick="convertToRoman()">Convert</button>
            <div class="result" id="romanResult"></div>
        </div>

        <hr>

        <div class="panel">
            <h2>Roman to Integer</h2>
            <input type="text" id="romanInput" placeholder="Enter a Roman numeral (e.g. XIV)">
            <button onclick="convertToInteger()">Convert</button>
            <div class="result" id="intResult"></div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        function convertToRoman() {
            const input = parseInt(document.getElementById('intInput').value, 10);
            const el = document.getElementById('romanResult');
            try {
                const result = toRoman(input);
                el.textContent = result;
                el.className = 'result';
                gtag('event', 'conversion_success', {
                    direction: 'integer_to_roman',
                    input_value: input,
                    output_value: result
                });
            } catch (e) {
                el.textContent = e.message;
                el.className = 'result error';
                gtag('event', 'conversion_error', {
                    direction: 'integer_to_roman',
                    error_message: e.message
                });
            }
        }

        function convertToInteger() {
            const input = document.getElementById('romanInput').value;
            const el = document.getElementById('intResult');
            try {
                const result = toInteger(input);
                el.textContent = result;
                el.className = 'result';
                gtag('event', 'conversion_success', {
                    direction: 'roman_to_integer',
                    input_value: input,
                    output_value: result
                });
            } catch (e) {
                el.textContent = e.message;
                el.className = 'result error';
                gtag('event', 'conversion_error', {
                    direction: 'roman_to_integer',
                    error_message: e.message
                });
            }
        }
    </script>
</body>
</html>
